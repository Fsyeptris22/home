<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Secret Memories 💖</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to bottom, #ffe4ec, #fff0f5);
  text-align: center;
}

.page { display: none; }
.active { display: block; }

.lock {
  font-size: 80px;
  margin-top: 100px;
  cursor: pointer;
}

.gallery {
  max-width: 700px;
  margin: auto;
  column-count: 3;
  column-gap: 12px;
  padding: 10px;
}

.photo {
  break-inside: avoid;
  margin-bottom: 12px;
  padding: 8px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 6px 12px rgba(255,150,180,0.25);
}

.photo img {
  width: 100%;
  border-radius: 8px;
}

.notes {
  background: white;
  margin: 30px auto;
  padding: 20px;
  width: 80%;
  max-width: 500px;
  border-radius: 15px;
}

textarea {
  width: 100%;
  height: 120px;
  border-radius: 10px;
  border: 1px solid pink;
  padding: 10px;
}

button {
  margin: 10px;
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  background: #ff9eb5;
  color: white;
  cursor: pointer;
}

.heart {
  position: fixed;
  bottom: -50px;
  font-size: 20px;
  color: #ff9eb5;
  animation: floatUp linear;
}

@keyframes floatUp {
  to {
    transform: translateY(-800px);
    opacity: 0;
  }
}
</style>

</head>
<body>

<!-- HOME -->
<div id="home" class="page active">
  <div class="lock" onclick="showLogin()">🔒</div>
  <div id="loginBox" style="display:none;">
    <input type="password" id="passwordInput" placeholder="Password">
    <br>
    <button onclick="checkPassword()">Buka 💖</button>
  </div>
</div>

<!-- GALLERY -->
<div id="galleryPage" class="page">
  <h2>Our Cute Moment🪷</h2>

  <!-- 🎵 MUSIC -->
  <button onclick="toggleMusic(this)">▶️ Play Music</button>
  <audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <div class="gallery">

    <div class="photo"><img src="foto1.jpg"></div>
    <div class="photo"><img src="foto2.jpg"></div>
    <div class="photo"><img src="foto3.jpg"></div>
    <div class="photo"><img src="foto4.jpg"></div>
    <div class="photo"><img src="foto5.jpg"></div>
    <div class="photo"><img src="foto6.jpg"></div>
    <div class="photo"><img src="foto7.jpg"></div>

  </div>

  <button onclick="goToNotes()">Next ➡️</button>
  <button onclick="lockApp()">🔒 Kunci</button>
</div>

<!-- NOTES -->
<div id="notesPage" class="page">
  <h2>💌 Notes</h2>

  <div class="notes">
    <textarea id="noteInput"></textarea>
    <br>
    <button onclick="saveNote()">Simpan</button>
  </div>

  <button onclick="goToGallery()">⬅️ Back</button>
  <button onclick="lockApp()">🔒 Kunci</button>
</div>

<script>
// PASSWORD
const PASSWORD = "17082023";

// NAV
function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function showLogin(){
  document.getElementById("loginBox").style.display="block";
}

function checkPassword(){
  const val=document.getElementById("passwordInput").value;
  if(val===PASSWORD){
    showPage("galleryPage");
  }else alert("Salah 😢");
}

function lockApp(){ showPage("home"); }
function goToNotes(){ showPage("notesPage"); }
function goToGallery(){ showPage("galleryPage"); }

// MUSIC
const music = document.getElementById("bgMusic");
let isPlaying = false;

function toggleMusic(btn){
  if(isPlaying){
    music.pause();
    btn.innerText = "▶️ Play Music";
  }else{
    music.play();
    btn.innerText = "⏸ Pause Music";
  }
  isPlaying = !isPlaying;
}

// NOTES
function saveNote(){
  localStorage.setItem("note",document.getElementById("noteInput").value);
  alert("Tersimpan 💖");
}

function loadNote(){
  const n=localStorage.getItem("note");
  if(n) document.getElementById("noteInput").value=n;
}

// HEART
function createHeart(){
  const h=document.createElement("div");
  h.className="heart";
  h.innerHTML="💗";
  h.style.left=Math.random()*window.innerWidth+"px";
  h.style.animationDuration=(3+Math.random()*2)+"s";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),5000);
}
setInterval(createHeart,300);

// INIT
window.onload=function(){
  loadNote();
}
</script>

</body>
</html>
